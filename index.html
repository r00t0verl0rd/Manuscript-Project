<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#053312" />
    <title>MANUSCRIPT PROJECT</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="partners.css" />
</head>


<body>
    <!-- Фоновые частицы (canvas) -->
    <div id="particles-js"></div>

    <!-- Основной контент страницы -->
    <div id="content" class="content">
        <!-- Блок частиц дублировался — убран, оставлен только основной -->
        <header class="header-container">
            <div class="header-row">
                <div id="about-mini-section">
                    <button id="more-btn" class="simple-btn nav-btn" data-i18n="more_btn">About</button>
                    <button id="road-map-btn" class="simple-btn nav-btn" data-i18n="road_map_btn">Road Map</button>
                    <button id="meme-part-btn" class="simple-btn nav-btn" data-i18n="meme_part_btn">Meme Part</button>

                    <button id="more-back-btn" class="simple-btn nav-back-btn" style="display:none"
                        data-i18n="about_back_btn">Back</button>
                    <button id="road-map-back-btn" class="simple-btn nav-back-btn" style="display:none"
                        data-i18n="about_back_btn">Back</button>
                    <button id="meme-part-back-btn" class="simple-btn nav-back-btn" style="display:none"
                        data-i18n="about_back_btn">Back</button>
                </div>
                <div class="header-end">
                    <div class="lang-switcher">
                        <button id="lang-toggle" class="lang-flag-btn">🇷🇺</button>
                    </div>
                </div>
            </div>
            <div class="wallet-row">
                <div id="wallet-info-placeholder" class="wallet-info" data-i18n="wallet_balance">Баланс: ?.?</div>
                <div id="wallet-mini-section">
                    <button id="connect-wallet-btn" class="simple-btn"
                        data-i18n="connect_wallet_btn">Connect</button>
                </div>
            </div>
        </header>

        <!-- Контент: шапка + лента идей -->
        <main class="main-wrapper">
            <h1 data-i18n="header_title">MANUSCRIPT PROJECT</h1>

            <div id="project-info" class="simple-card">
                <button id="close-info-btn" class="close-icon">&times;</button>
                <h2 data-i18n="info_title">ААААААА</h2>
                <p data-i18n="info_desc">BBBBBBB</p>
                <div class="intent-more-wrapper">
                    <button id="intent-more-btn" class="simple-btn" data-i18n="intent_more_btn">ещё</button>
                </div>
            </div>

            <div id="nft-section" class="simple-card" style="display: none">
                <h2 data-i18n="create_idea_title"></h2>
                <form id="create-nft-form">
                    <input type="text" id="idea-text" placeholder="..." class="simple-input" required
                        data-i18n-placeholder="idea_placeholder" />
                    <button type="submit" class="simple-btn primary" data-i18n="mint_btn">Mint Proposal</button>
                </form>
                <div id="transaction-status"></div>
            </div>

            <div id="ideas-feed">
                <h2 data-i18n="community_ideas_title"></h2>

                <div class="sort-row">
                    <div class="sort-label" aria-hidden="true" title="Sort"></div>
                    <div class="type-selector" role="group" aria-label="Idea sorting">
                        <label class="radio-label">
                            <input type="radio" name="sort" value="diamonds_desc" checked />
                            <span class="radio-custom">💎 Max</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="sort" value="diamonds_asc" />
                            <span class="radio-custom">💎 Min</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="sort" value="created_desc" />
                            <span class="radio-custom">⏱ New</span>
                        </label>
                    </div>
                </div>

                <div class="feed-columns">
                    <div class="feed-column" data-feed-col="1">
                        <h3 data-i18n="feed_1_title">Feed 1</h3>
                        <div id="feed-1">
                            <p class="loading-msg">Loading...</p>
                        </div>
                    </div>
                    <div class="feed-column" data-feed-col="2">
                        <h3 data-i18n="feed_2_title">Feed 2</h3>
                        <div id="feed-2">
                            <p class="loading-msg">Loading...</p>
                        </div>
                    </div>
                    <div class="feed-column" data-feed-col="3">
                        <h3 data-i18n="feed_3_title">Feed 3</h3>
                        <div id="feed-3">
                            <p class="loading-msg">Loading...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Партнёры (всегда на всех страницах) -->
            <section class="partners-section" aria-label="Partners">
                <h2 data-i18n="partners_title">Партнёры</h2>

                <div class="partners-logos" style="grid-template-columns: repeat(3, minmax(0, 1fr));">
                    <div class="partner-logo" aria-label="Partner 1">
                        <svg width="220" height="30" viewBox="0 0 220 30" xmlns="http://www.w3.org/2000/svg"
                            aria-hidden="true">
                            <!-- Partner 1: BTC-like coin (demo wide) -->
                            <rect x="0" y="4" width="220" height="22" rx="8" fill="rgba(255,180,0,0.06)"
                                stroke="rgba(255,180,0,0.18)" />
                            <text x="112" y="20" text-anchor="middle" font-family="Russo One, sans-serif" font-size="12"
                                fill="rgba(255,230,200,0.85)">BTC-ORBIT</text>
                            <g transform="translate(40,0)">
                                <defs>
                                    <linearGradient id="btcG" x1="0" y1="0" x2="1" y2="1">
                                        <stop offset="0" stop-color="rgba(255,180,0,0.85)" />
                                        <stop offset="1" stop-color="rgba(255,94,0,0.35)" />
                                    </linearGradient>
                                </defs>
                                <circle cx="43" cy="15" r="12" fill="rgba(255,180,0,0.10)" stroke="rgba(255,180,0,0.55)"
                                    stroke-width="1" />
                                <circle cx="43" cy="15" r="9" fill="url(#btcG)" opacity="0.9" />
                                <path d="M45 10c-1-1-3-1-4-1v10c2 0 3 0 4-1 2-2 2-6 0-7z" fill="rgba(0,0,0,0.35)" />
                                <path d="M40 11h4c3 0 4 2 4 4s-1 4-4 4h-4v-8z" fill="rgba(255,255,255,0.10)" />
                                <path d="M39.5 9.7h7" stroke="rgba(255,255,255,0.35)" stroke-width="1"
                                    stroke-linecap="round" />
                                <path d="M39.5 20.3h7" stroke="rgba(255,255,255,0.35)" stroke-width="1"
                                    stroke-linecap="round" />
                                <path d="M44 14.2h0.2c1.8 0 1.8 1.2 0 1.2H44z" fill="rgba(0,229,255,0.35)" />
                            </g>
                        </svg>
                    </div>
                    <div class="partner-logo" aria-label="Partner 2">
                        <svg width="220" height="30" viewBox="0 0 220 30" xmlns="http://www.w3.org/2000/svg"
                            aria-hidden="true">
                            <rect x="0" y="4" width="220" height="22" rx="8" fill="rgba(255,94,0,0.06)"
                                stroke="rgba(255,94,0,0.18)" />
                            <text x="112" y="20" text-anchor="middle" font-family="Russo One, sans-serif" font-size="12"
                                fill="rgba(255,230,200,0.85)">VENUS-SECTOR</text>
                            <g transform="translate(40,0)">
                                <!-- Partner 2: Venus / starburst -->
                                <defs>
                                    <radialGradient id="venG" cx="50%" cy="50%" r="60%">
                                        <stop offset="0" stop-color="rgba(255,94,0,0.45)" />
                                        <stop offset="1" stop-color="rgba(189,0,255,0.15)" />
                                    </radialGradient>
                                </defs>
                                <circle cx="43" cy="15" r="10" fill="rgba(255,94,0,0.08)" stroke="rgba(255,94,0,0.55)"
                                    stroke-width="1" />
                                <circle cx="43" cy="15" r="7" fill="url(#venG)" opacity="0.95" />

                                <g stroke-linecap="round">
                                    <path d="M43 3.5v4" stroke="rgba(255,255,255,0.45)" stroke-width="1.4" />
                                    <path d="M43 22.5v4" stroke="rgba(255,255,255,0.35)" stroke-width="1.4" />
                                    <path d="M31 15h-4" stroke="rgba(0,229,255,0.35)" stroke-width="1.4" />
                                    <path d="M59 15h4" stroke="rgba(57,255,20,0.35)" stroke-width="1.4" />

                                    <path d="M34 6.8l2.2 3" stroke="rgba(189,0,255,0.35)" stroke-width="1.4" />
                                    <path d="M52 20.2l2.2 3" stroke="rgba(189,0,255,0.25)" stroke-width="1.4" />
                                    <path d="M34 23.2l2.2-3" stroke="rgba(0,229,255,0.25)" stroke-width="1.4" />
                                    <path d="M52 9.8l2.2-3" stroke="rgba(0,229,255,0.35)" stroke-width="1.4" />
                                </g>

                                <!-- little orbit ring -->
                                <path d="M33 15c2-6 18-6 20 0" fill="none" stroke="rgba(255,255,255,0.25)"
                                    stroke-width="1" />
                        </svg>
                    </div>

                    <div class="partner-logo" aria-label="Partner 3">
                        <svg width="220" height="30" viewBox="0 0 220 30" xmlns="http://www.w3.org/2000/svg"
                            aria-hidden="true">
                            <rect x="0" y="4" width="220" height="22" rx="8" fill="rgba(57,255,20,0.06)"
                                stroke="rgba(57,255,20,0.18)" />
                            <text x="112" y="20" text-anchor="middle" font-family="Russo One, sans-serif" font-size="12"
                                fill="rgba(230,255,210,0.85)">TON-MAGNET</text>
                            <g transform="translate(40,0)">
                                <!-- Partner 3: TON-ish capsule + pulse -->
                                <defs>
                                    <linearGradient id="tonG" x1="0" y1="0" x2="1" y2="1">
                                        <stop offset="0" stop-color="rgba(0,229,255,0.35)" />
                                        <stop offset="1" stop-color="rgba(189,0,255,0.22)" />
                                    </linearGradient>
                                </defs>
                                <path d="M22 9c0-2 2-4 4-4h30c2 0 4 2 4 4v12c0 2-2 4-4 4H26c-2 0-4-2-4-4V9z"
                                    fill="rgba(0,0,0,0.15)" stroke="rgba(0,229,255,0.28)" stroke-width="1.2" />
                                <path d="M26 8c0-1 1-2 2-2h26c1 0 2 1 2 2v14c0 1-1 2-2 2H28c-1 0-2-1-2-2V8z"
                                    fill="url(#tonG)" opacity="0.95" />
                                <path d="M34 19c2-6 6-10 14-10" fill="none" stroke="rgba(255,255,255,0.35)"
                                    stroke-width="1.6" stroke-linecap="round" />
                                <path d="M38 13l-4 2 4 2" fill="none" stroke="rgba(57,255,20,0.35)" stroke-width="1.4"
                                    stroke-linecap="round" stroke-linejoin="round" />
                                <circle cx="64" cy="15" r="2.3" fill="rgba(57,255,20,0.45)" />
                        </svg>
                    </div>
                    <div class="partner-logo" aria-label="Partner 4">
                        <svg width="220" height="30" viewBox="0 0 220 30" xmlns="http://www.w3.org/2000/svg"
                            aria-hidden="true">
                            <rect x="0" y="4" width="220" height="22" rx="8" fill="rgba(0,229,255,0.06)"
                                stroke="rgba(0,229,255,0.18)" />
                            <text x="112" y="20" text-anchor="middle" font-family="Russo One, sans-serif" font-size="12"
                                fill="rgba(220,250,255,0.85)">SOLANA-SPEED</text>
                            <g transform="translate(40,0)">
                                <!-- Partner 4: Solana-ish neon triangles -->
                                <defs>
                                    <linearGradient id="solG" x1="0" y1="0" x2="0" y2="1">
                                        <stop offset="0" stop-color="rgba(57,255,20,0.45)" />
                                        <stop offset="1" stop-color="rgba(0,229,255,0.18)" />
                                    </linearGradient>
                                </defs>
                                <path d="M18 24L31 8h10L28 24H18z" fill="rgba(0,229,255,0.18)"
                                    stroke="rgba(0,229,255,0.40)" stroke-width="1" />
                                <path d="M31 8L44 24h-10L31 8z" fill="rgba(57,255,20,0.12)"
                                    stroke="rgba(57,255,20,0.40)" stroke-width="1" />
                                <path d="M44 24l13-16h-10L34 24h10z" fill="url(#solG)" opacity="0.95" />
                                <path d="M20 9c3-2 10-2 14 0" fill="none" stroke="rgba(189,0,255,0.30)"
                                    stroke-width="1.4" stroke-linecap="round" />
                                <circle cx="62" cy="14" r="2.2" fill="rgba(255,94,0,0.28)"
                                    stroke="rgba(255,255,255,0.25)" stroke-width="0.8" />
                        </svg>
                    </div>
                    <div class="partner-logo" aria-label="Partner 5">
                        <svg width="220" height="30" viewBox="0 0 220 30" xmlns="http://www.w3.org/2000/svg"
                            aria-hidden="true">
                            <rect x="0" y="4" width="220" height="22" rx="8" fill="rgba(189,0,255,0.06)"
                                stroke="rgba(189,0,255,0.18)" />
                            <text x="112" y="20" text-anchor="middle" font-family="Russo One, sans-serif" font-size="12"
                                fill="rgba(245,220,255,0.85)">WSA-TRUST</text>
                            <g transform="translate(40,0)">
                                <!-- Partner 5: World Service Authority shield -->
                                <defs>
                                    <linearGradient id="wsaG" x1="0" y1="0" x2="1" y2="1">
                                        <stop offset="0" stop-color="rgba(189,0,255,0.25)" />
                                        <stop offset="1" stop-color="rgba(0,229,255,0.16)" />
                                    </linearGradient>
                                </defs>
                                <path d="M43 3.8l20 6v10.5c0 6.2-9.2 10.8-20 12.1C32.2 31.1 23 26.5 23 20.3V9.8l20-6z"
                                    fill="url(#wsaG)" opacity="0.95" stroke="rgba(255,255,255,0.22)"
                                    stroke-width="1.1" />
                                <path d="M43 10.5l8 5-8 5-8-5 8-5z" fill="rgba(0,229,255,0.22)"
                                    stroke="rgba(0,229,255,0.35)" stroke-width="0.9" />
                                <path d="M35 20.5c4 2.6 12 2.6 16 0" fill="none" stroke="rgba(57,255,20,0.30)"
                                    stroke-width="1.5" stroke-linecap="round" />
                                <circle cx="43" cy="15" r="2.1" fill="rgba(255,94,0,0.25)" />
                        </svg>
                    </div>
                    <div class="partner-logo" aria-label="Partner 6">
                        <svg width="220" height="30" viewBox="0 0 220 30" xmlns="http://www.w3.org/2000/svg"
                            aria-hidden="true">
                            <rect x="0" y="4" width="220" height="22" rx="8" fill="rgba(255,94,0,0.06)"
                                stroke="rgba(255,94,0,0.18)" />
                            <text x="112" y="20" text-anchor="middle" font-family="Russo One, sans-serif" font-size="12"
                                fill="rgba(255,235,220,0.85)">CHAIN-NODE</text>
                            <g transform="translate(40,0)">
                                <!-- Partner 6: TON-ish pulse + node -->
                                <defs>
                                    <linearGradient id="nodeG" x1="0" y1="0" x2="1" y2="1">
                                        <stop offset="0" stop-color="rgba(0,229,255,0.22)" />
                                        <stop offset="1" stop-color="rgba(57,255,20,0.18)" />
                                    </linearGradient>
                                </defs>
                                <circle cx="28" cy="15" r="7" fill="rgba(0,229,255,0.10)" stroke="rgba(0,229,255,0.35)"
                                    stroke-width="1.2" />
                                <circle cx="28" cy="15" r="3.6" fill="url(#nodeG)" opacity="0.95" />
                                <path d="M38 15h10" stroke="rgba(255,255,255,0.25)" stroke-width="1.6"
                                    stroke-linecap="round" />
                                <path d="M50 10c2 1.5 3 3.2 3 5s-1 3.5-3 5" fill="none" stroke="rgba(189,0,255,0.30)"
                                    stroke-width="1.5" stroke-linecap="round" />
                                <path d="M52 15h12" stroke="rgba(57,255,20,0.35)" stroke-width="1.5"
                                    stroke-linecap="round" />
                                <path d="M52 12.2c3.2.8 6.2 2.2 9 4.8" fill="none" stroke="rgba(255,94,0,0.22)"
                                    stroke-width="1.2" stroke-linecap="round" />
                        </svg>
                    </div>

            </section>
        </main>
    </div>

    <footer>

        <p>&copy; <span id="current-year"></span> Manuscript Project.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="i18n.js"></script>
    <script src="script.js"></script>
    <script src="particles-config.js"></script>
</body>

</html>
